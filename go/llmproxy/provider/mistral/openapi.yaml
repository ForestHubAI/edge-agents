openapi: 3.0.3
info:
  title: Mistral AI API
  description: >-
    Our Chat Completion and Embeddings APIs specification. Create your account
    on [La Plateforme](https://console.mistral.ai) to get access and read the
    [docs](https://docs.mistral.ai) to learn how to use it.
  version: 1.0.0

paths: {}
components:
  schemas:
    BaseModelCard:
      properties:
        id:
          type: string
          title: Id
        object:
          type: string
          title: Object
          default: model
        created:
          type: integer
          title: Created
        owned_by:
          type: string
          title: Owned By
          default: mistralai
        capabilities:
          $ref: '#/components/schemas/ModelCapabilities'
        name:
          type: string
          nullable: true
          title: Name
        description:
          type: string
          nullable: true
          title: Description
        max_context_length:
          type: integer
          title: Max Context Length
          default: 32768
        aliases:
          items:
            type: string
          type: array
          title: Aliases
          default: []
        deprecation:
          type: string
          format: date-time
          nullable: true
          title: Deprecation
        deprecation_replacement_model:
          type: string
          nullable: true
          title: Deprecation Replacement Model
        default_model_temperature:
          type: number
          nullable: true
          title: Default Model Temperature
        type:
          type: string
          title: Type
          enum:
            - base
      type: object
      required:
        - type
        - id
        - capabilities
      title: BaseModelCard
    DeleteModelOut:
      properties:
        id:
          type: string
          title: Id
          description: The ID of the deleted model.
          example: ft:open-mistral-7b:587a6b29:20240514:7e773925
        object:
          type: string
          title: Object
          default: model
          description: The object type that was deleted
        deleted:
          type: boolean
          title: Deleted
          default: true
          description: The deletion status
          example: true
      type: object
      required:
        - id
      title: DeleteModelOut
    FTModelCard:
      properties:
        id:
          type: string
          title: Id
        object:
          type: string
          title: Object
          default: model
        created:
          type: integer
          title: Created
        owned_by:
          type: string
          title: Owned By
          default: mistralai
        capabilities:
          $ref: '#/components/schemas/ModelCapabilities'
        name:
          type: string
          nullable: true
          title: Name
        description:
          type: string
          nullable: true
          title: Description
        max_context_length:
          type: integer
          title: Max Context Length
          default: 32768
        aliases:
          items:
            type: string
          type: array
          title: Aliases
          default: []
        deprecation:
          type: string
          format: date-time
          nullable: true
          title: Deprecation
        deprecation_replacement_model:
          type: string
          nullable: true
          title: Deprecation Replacement Model
        default_model_temperature:
          type: number
          nullable: true
          title: Default Model Temperature
        type:
          type: string
          title: Type
          enum:
            - fine-tuned
        job:
          type: string
          title: Job
        root:
          type: string
          title: Root
        archived:
          type: boolean
          title: Archived
          default: false
      type: object
      required:
        - type
        - id
        - capabilities
        - job
        - root
      title: FTModelCard
      description: Extra fields for fine-tuned models.
    HTTPValidationError:
      properties:
        detail:
          items:
            $ref: '#/components/schemas/ValidationError'
          type: array
          title: Detail
      type: object
      title: HTTPValidationError
    ModelCapabilities:
      properties:
        completion_chat:
          type: boolean
          title: Completion Chat
          default: true
        completion_fim:
          type: boolean
          title: Completion Fim
          default: false
        function_calling:
          type: boolean
          title: Function Calling
          default: true
        fine_tuning:
          type: boolean
          title: Fine Tuning
          default: false
        vision:
          type: boolean
          title: Vision
          default: false
        classification:
          type: boolean
          title: Classification
          default: false
      type: object
      title: ModelCapabilities
    ModelList:
      properties:
        object:
          type: string
          title: Object
          default: list
        data:
          items:
            oneOf:
              - $ref: '#/components/schemas/BaseModelCard'
              - $ref: '#/components/schemas/FTModelCard'
            discriminator:
              propertyName: type
              mapping:
                base: '#/components/schemas/BaseModelCard'
                fine-tuned: '#/components/schemas/FTModelCard'
          type: array
          title: Data
      type: object
      title: ModelList
    ValidationError:
      properties:
        loc:
          items:
            anyOf:
              - type: string
              - type: integer
          type: array
          title: Location
        msg:
          type: string
          title: Message
        type:
          type: string
          title: Error Type
      type: object
      required:
        - loc
        - msg
        - type
      title: ValidationError
    Agent:
      properties:
        instructions:
          type: string
          nullable: true
          title: Instructions
          description: Instruction prompt the model will follow during the conversation.
        tools:
          items:
            oneOf:
              - $ref: '#/components/schemas/FunctionTool'
              - $ref: '#/components/schemas/WebSearchTool'
              - $ref: '#/components/schemas/WebSearchPremiumTool'
              - $ref: '#/components/schemas/CodeInterpreterTool'
              - $ref: '#/components/schemas/ImageGenerationTool'
              - $ref: '#/components/schemas/DocumentLibraryTool'
            discriminator:
              propertyName: type
              mapping:
                code_interpreter: '#/components/schemas/CodeInterpreterTool'
                document_library: '#/components/schemas/DocumentLibraryTool'
                function: '#/components/schemas/FunctionTool'
                image_generation: '#/components/schemas/ImageGenerationTool'
                web_search: '#/components/schemas/WebSearchTool'
                web_search_premium: '#/components/schemas/WebSearchPremiumTool'
          type: array
          title: Tools
          description: >-
            List of tools which are available to the model during the
            conversation.
        completion_args:
          $ref: '#/components/schemas/CompletionArgs'
          description: >-
            Completion arguments that will be used to generate assistant
            responses. Can be overridden at each message request.
        model:
          type: string
          title: Model
        name:
          type: string
          title: Name
        description:
          type: string
          nullable: true
          title: Description
        handoffs:
          type: array
          items:
            type: string
          minItems: 1
          nullable: true
          title: Handoffs
        object:
          type: string
          enum:
            - agent
          title: Object
          default: agent
        id:
          type: string
          title: Id
        version:
          type: integer
          title: Version
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
      additionalProperties: false
      type: object
      required:
        - model
        - name
        - id
        - version
        - created_at
        - updated_at
      title: Agent
    AgentConversation:
      properties:
        name:
          type: string
          nullable: true
          title: Name
          description: Name given to the conversation.
        description:
          type: string
          nullable: true
          title: Description
          description: Description of the what the conversation is about.
        object:
          type: string
          enum:
            - conversation
          title: Object
          default: conversation
        id:
          type: string
          title: Id
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
        agent_id:
          type: string
          title: Agent Id
      additionalProperties: false
      type: object
      required:
        - id
        - created_at
        - updated_at
        - agent_id
      title: AgentConversation
    AgentCreationRequest:
      properties:
        instructions:
          type: string
          nullable: true
          title: Instructions
          description: Instruction prompt the model will follow during the conversation.
        tools:
          items:
            oneOf:
              - $ref: '#/components/schemas/FunctionTool'
              - $ref: '#/components/schemas/WebSearchTool'
              - $ref: '#/components/schemas/WebSearchPremiumTool'
              - $ref: '#/components/schemas/CodeInterpreterTool'
              - $ref: '#/components/schemas/ImageGenerationTool'
              - $ref: '#/components/schemas/DocumentLibraryTool'
            discriminator:
              propertyName: type
              mapping:
                code_interpreter: '#/components/schemas/CodeInterpreterTool'
                document_library: '#/components/schemas/DocumentLibraryTool'
                function: '#/components/schemas/FunctionTool'
                image_generation: '#/components/schemas/ImageGenerationTool'
                web_search: '#/components/schemas/WebSearchTool'
                web_search_premium: '#/components/schemas/WebSearchPremiumTool'
          type: array
          title: Tools
          description: >-
            List of tools which are available to the model during the
            conversation.
        completion_args:
          $ref: '#/components/schemas/CompletionArgs'
          description: >-
            Completion arguments that will be used to generate assistant
            responses. Can be overridden at each message request.
        model:
          type: string
          title: Model
        name:
          type: string
          title: Name
        description:
          type: string
          nullable: true
          title: Description
        handoffs:
          items:
            type: string
          minItems: 1
          nullable: true
          title: Handoffs
      additionalProperties: false
      type: object
      required:
        - model
        - name
      title: AgentCreationRequest
    AgentHandoffEntry:
      properties:
        object:
          type: string
          enum:
            - entry
          title: Object
          default: entry
        type:
          type: string
          enum:
            - agent.handoff
          title: Type
          default: agent.handoff
        created_at:
          type: string
          format: date-time
          title: Created At
        completed_at:
          type: string
          format: date-time
          nullable: true
          title: Completed At
        id:
          type: string
          title: Id
        previous_agent_id:
          type: string
          title: Previous Agent Id
        previous_agent_name:
          type: string
          title: Previous Agent Name
        next_agent_id:
          type: string
          title: Next Agent Id
        next_agent_name:
          type: string
          title: Next Agent Name
      additionalProperties: false
      type: object
      required:
        - previous_agent_id
        - previous_agent_name
        - next_agent_id
        - next_agent_name
      title: AgentHandoffEntry
    AgentUpdateRequest:
      properties:
        instructions:
          type: string
          nullable: true
          title: Instructions
          description: Instruction prompt the model will follow during the conversation.
        tools:
          items:
            oneOf:
              - $ref: '#/components/schemas/FunctionTool'
              - $ref: '#/components/schemas/WebSearchTool'
              - $ref: '#/components/schemas/WebSearchPremiumTool'
              - $ref: '#/components/schemas/CodeInterpreterTool'
              - $ref: '#/components/schemas/ImageGenerationTool'
              - $ref: '#/components/schemas/DocumentLibraryTool'
            discriminator:
              propertyName: type
              mapping:
                code_interpreter: '#/components/schemas/CodeInterpreterTool'
                document_library: '#/components/schemas/DocumentLibraryTool'
                function: '#/components/schemas/FunctionTool'
                image_generation: '#/components/schemas/ImageGenerationTool'
                web_search: '#/components/schemas/WebSearchTool'
                web_search_premium: '#/components/schemas/WebSearchPremiumTool'
          type: array
          title: Tools
          description: >-
            List of tools which are available to the model during the
            conversation.
        completion_args:
          $ref: '#/components/schemas/CompletionArgs'
          description: >-
            Completion arguments that will be used to generate assistant
            responses. Can be overridden at each message request.
        model:
          type: string
          nullable: true
          title: Model
        name:
          type: string
          nullable: true
          title: Name
        description:
          type: string
          nullable: true
          title: Description
        handoffs:
          items:
            type: string
          minItems: 1
          nullable: true
          title: Handoffs
      additionalProperties: false
      type: object
      title: AgentUpdateRequest
    BuiltInConnectors:
      type: string
      enum:
        - web_search
        - web_search_premium
        - code_interpreter
        - image_generation
        - document_library
      title: BuiltInConnectors
    CodeInterpreterTool:
      required: [type]
      properties:
        type:
          type: string
          enum:
            - code_interpreter
          title: Type
      additionalProperties: false
      type: object
      title: CodeInterpreterTool
    CompletionArgs:
      properties:
        stop:
          $ref: '#/components/schemas/CompletionArgsStop'
        presence_penalty:
          type: number
          maximum: 2
          minimum: -2
          nullable: true
          title: Presence Penalty
        frequency_penalty:
          type: number
          maximum: 2
          minimum: -2
          nullable: true
          title: Frequency Penalty
        temperature:
          type: number
          maximum: 1
          minimum: 0
          nullable: true
          title: Temperature
        top_p:
          type: number
          maximum: 1
          minimum: 0
          nullable: true
          title: Top P
        max_tokens:
          type: integer
          minimum: 0
          nullable: true
          title: Max Tokens
        random_seed:
          type: integer
          minimum: 0
          nullable: true
          title: Random Seed
        prediction:
          $ref: '#/components/schemas/Prediction'
          nullable: true
        response_format:
          $ref: '#/components/schemas/ResponseFormat'
          nullable: true
        tool_choice:
          $ref: '#/components/schemas/ToolChoiceEnum'
          default: auto
      additionalProperties: false
      type: object
      title: CompletionArgs
      description: White-listed arguments from the completion API
    ConversationAppendRequest:
      allOf:
        - $ref: '#/components/schemas/ConversationAppendRequestBase'
        - type: object
          properties:
            stream:
              type: boolean
              enum:
                - false
              default: false
    ConversationHistory:
      properties:
        object:
          type: string
          enum:
            - conversation.history
          title: Object
          default: conversation.history
        conversation_id:
          type: string
          title: Conversation Id
        entries:
          items:
            anyOf:
              - $ref: '#/components/schemas/MessageInputEntry'
              - $ref: '#/components/schemas/MessageOutputEntry'
              - $ref: '#/components/schemas/FunctionResultEntry'
              - $ref: '#/components/schemas/FunctionCallEntry'
              - $ref: '#/components/schemas/ToolExecutionEntry'
              - $ref: '#/components/schemas/AgentHandoffEntry'
          type: array
          title: Entries
      additionalProperties: false
      type: object
      required:
        - conversation_id
        - entries
      title: ConversationHistory
      description: Retrieve all entries in a conversation.
    ConversationMessages:
      properties:
        object:
          type: string
          enum:
            - conversation.messages
          title: Object
          default: conversation.messages
        conversation_id:
          type: string
          title: Conversation Id
        messages:
          $ref: '#/components/schemas/MessageEntries'
      additionalProperties: false
      type: object
      required:
        - conversation_id
        - messages
      title: ConversationMessages
      description: Similar to the conversation history but only keep the messages
    ConversationRestartRequest:
      allOf:
        - $ref: '#/components/schemas/ConversationRestartRequestBase'
        - type: object
          properties:
            stream:
              type: boolean
              enum:
                - false
              default: false
    DocumentLibraryTool:
      required: [type, library_ids]
      properties:
        type:
          type: string
          enum:
            - document_library
          title: Type
        library_ids:
          items:
            type: string
          type: array
          minItems: 1
          title: Library Ids
          description: Ids of the library in which to search.
      additionalProperties: false
      type: object
      title: DocumentLibraryTool
    DocumentURLChunk:
      properties:
        document_url:
          type: string
          title: Document Url
        document_name:
          type: string
          nullable: true
          title: Document Name
          description: The filename of the document
        type:
          type: string
          enum:
            - document_url
          title: Type
      additionalProperties: false
      type: object
      required:
        - document_url
        - type
      title: DocumentURLChunk
    Function:
      properties:
        name:
          type: string
          title: Name
        description:
          type: string
          title: Description
          default: ''
        strict:
          type: boolean
          title: Strict
          default: false
        parameters:
          additionalProperties: true
          type: object
          title: Parameters
      additionalProperties: false
      type: object
      required:
        - name
        - parameters
      title: Function
    FunctionCallEntry:
      properties:
        object:
          type: string
          enum:
            - entry
          title: Object
          default: entry
        type:
          type: string
          enum:
            - function.call
          title: Type
          default: function.call
        created_at:
          type: string
          format: date-time
          title: Created At
        completed_at:
          type: string
          format: date-time
          nullable: true
          title: Completed At
        id:
          type: string
          title: Id
        tool_call_id:
          type: string
          title: Tool Call Id
        name:
          type: string
          title: Name
        arguments:
          $ref: '#/components/schemas/FunctionCallEntryArguments'
      additionalProperties: false
      type: object
      required:
        - tool_call_id
        - name
        - arguments
      title: FunctionCallEntry
    FunctionResultEntry:
      properties:
        object:
          type: string
          enum:
            - entry
          title: Object
          default: entry
        type:
          type: string
          enum:
            - function.result
          title: Type
          default: function.result
        created_at:
          type: string
          format: date-time
          title: Created At
        completed_at:
          type: string
          format: date-time
          nullable: true
          title: Completed At
        id:
          type: string
          title: Id
        tool_call_id:
          type: string
          title: Tool Call Id
        result:
          type: string
          title: Result
      additionalProperties: false
      type: object
      required:
        - tool_call_id
        - result
      title: FunctionResultEntry
    FunctionTool:
      required: [type, function]
      properties:
        type:
          type: string
          enum:
            - function
          title: Type
        function:
          $ref: '#/components/schemas/Function'
      additionalProperties: false
      type: object
      title: FunctionTool
    ImageGenerationTool:
      required: [type]
      properties:
        type:
          type: string
          enum:
            - image_generation
          title: Type
      additionalProperties: false
      type: object
      title: ImageGenerationTool
    ImageURLChunk:
      properties:
        image_url:
          anyOf:
            - $ref: '#/components/schemas/ImageURL'
            - type: string
          title: Image Url
        type:
          type: string
          enum:
            - image_url
          title: Type
      additionalProperties: false
      type: object
      required:
        - type
        - image_url
      title: ImageURLChunk
      description: '{"type":"image_url","image_url":{"url":"data:image/png;base64,iVBORw0'
    JsonSchema:
      properties:
        name:
          type: string
          title: Name
        description:
          type: string
          nullable: true
          title: Description
        schema:
          additionalProperties: true
          type: object
          title: Schema
          x-speakeasy-name-override: schema_definition
        strict:
          type: boolean
          title: Strict
          default: false
      additionalProperties: false
      type: object
      required:
        - name
        - schema
      title: JsonSchema
    MessageInputEntry:
      properties:
        object:
          type: string
          enum:
            - entry
          title: Object
          default: entry
        type:
          type: string
          enum:
            - message.input
          title: Type
          default: message.input
        created_at:
          type: string
          format: date-time
          title: Created At
        completed_at:
          type: string
          format: date-time
          nullable: true
          title: Completed At
        id:
          type: string
          title: Id
        role:
          type: string
          enum:
            - assistant
            - user
          title: Role
        content:
          anyOf:
            - type: string
            - $ref: '#/components/schemas/MessageInputContentChunks'
          title: Content
        prefix:
          type: boolean
          title: Prefix
          default: false
      additionalProperties: false
      type: object
      required:
        - role
        - content
      title: MessageInputEntry
      description: Representation of an input message inside the conversation.
    MessageOutputEntry:
      properties:
        object:
          type: string
          enum:
            - entry
          title: Object
          default: entry
        type:
          type: string
          enum:
            - message.output
          title: Type
          default: message.output
        created_at:
          type: string
          format: date-time
          title: Created At
        completed_at:
          type: string
          format: date-time
          nullable: true
          title: Completed At
        id:
          type: string
          title: Id
        agent_id:
          type: string
          nullable: true
          title: Agent Id
        model:
          type: string
          nullable: true
          title: Model
        role:
          type: string
          enum:
            - assistant
          title: Role
          default: assistant
        content:
          anyOf:
            - type: string
            - $ref: '#/components/schemas/MessageOutputContentChunks'
          title: Content
      additionalProperties: false
      type: object
      required:
        - content
      title: MessageOutputEntry
    ModelConversation:
      properties:
        instructions:
          type: string
          nullable: true
          title: Instructions
          description: Instruction prompt the model will follow during the conversation.
        tools:
          items:
            oneOf:
              - $ref: '#/components/schemas/FunctionTool'
              - $ref: '#/components/schemas/WebSearchTool'
              - $ref: '#/components/schemas/WebSearchPremiumTool'
              - $ref: '#/components/schemas/CodeInterpreterTool'
              - $ref: '#/components/schemas/ImageGenerationTool'
              - $ref: '#/components/schemas/DocumentLibraryTool'
            discriminator:
              propertyName: type
              mapping:
                code_interpreter: '#/components/schemas/CodeInterpreterTool'
                document_library: '#/components/schemas/DocumentLibraryTool'
                function: '#/components/schemas/FunctionTool'
                image_generation: '#/components/schemas/ImageGenerationTool'
                web_search: '#/components/schemas/WebSearchTool'
                web_search_premium: '#/components/schemas/WebSearchPremiumTool'
          type: array
          title: Tools
          description: >-
            List of tools which are available to the model during the
            conversation.
        completion_args:
          $ref: '#/components/schemas/CompletionArgs'
          description: >-
            Completion arguments that will be used to generate assistant
            responses. Can be overridden at each message request.
        name:
          type: string
          nullable: true
          title: Name
          description: Name given to the conversation.
        description:
          type: string
          nullable: true
          title: Description
          description: Description of the what the conversation is about.
        object:
          type: string
          enum:
            - conversation
          title: Object
          default: conversation
        id:
          type: string
          title: Id
        created_at:
          type: string
          format: date-time
          title: Created At
        updated_at:
          type: string
          format: date-time
          title: Updated At
        model:
          type: string
          title: Model
      additionalProperties: false
      type: object
      required:
        - id
        - created_at
        - updated_at
        - model
      title: ModelConversation
    Prediction:
      properties:
        type:
          type: string
          title: Type
          default: content
          enum:
            - content
        content:
          type: string
          title: Content
          default: ''
      additionalProperties: false
      type: object
      title: Prediction
      description: >-
        Enable users to specify an expected completion, optimizing response
        times by leveraging known or predictable content.
    ResponseFormat:
      properties:
        type:
          $ref: '#/components/schemas/ResponseFormats'
          default: text
        json_schema:
          $ref: '#/components/schemas/JsonSchema'
          nullable: true
      required:
        - type
      additionalProperties: false
      type: object
      title: ResponseFormat
      description: >-
        Specify the format that the model must output. By default it will use `{
        "type": "text" }`. Setting to `{ "type": "json_object" }` enables JSON
        mode, which guarantees the message the model generates is in JSON. When
        using JSON mode you MUST also instruct the model to produce JSON
        yourself with a system or a user message. Setting to `{ "type":
        "json_schema" }` enables JSON schema mode, which guarantees the message
        the model generates is in JSON and follows the schema you provide.
      example:
        type: text
    ResponseFormats:
      type: string
      enum:
        - text
        - json_object
        - json_schema
      title: ResponseFormats
    TextChunk:
      properties:
        text:
          type: string
          title: Text
        type:
          type: string
          enum:
