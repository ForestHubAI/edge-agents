# ForestHub Engine Deploy & Control-Plane Contract — part of the ForestHub contract. SOURCE OF TRUTH.
# Generated by the contract split (PLAN.md). $refs workflow.yaml (one-directional).
openapi: 3.0.3
info:
  title: ForestHub Engine Deploy & Control-Plane Contract
  version: 0.1.0
  description: "Engine<->control-plane wire: deploy/redeploy/boot/heartbeat/memory-sync/runtime-status/preflight/RAG-query."
paths:
  /healthz:
    get:
      operationId: healthz
      summary: Engine runner state.
      responses:
        '200':
          description: Current runner state.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthzResponse"
  /deploy:
    post:
      operationId: deploy
      summary: Deploy or hot-swap a workflow.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeployRequest"
      responses:
        '204':
          description: Workflow deployed.
        '400':
          description: Invalid request (e.g. missing workflow).
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngineError"
        '422':
          description: Build failure.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngineError"
  /stop:
    post:
      operationId: stop
      summary: Stop the running workflow (idempotent when idle).
      responses:
        '204':
          description: Runner stopped.
components:
  schemas:

    # --- Engine-served surface (GET /healthz, POST /deploy, POST /stop) ---

    State:
      type: string
      enum: [idle, running]
      description: Engine runner state.

    HealthzResponse:
      type: object
      required: [status]
      properties:
        status:
          $ref: "#/components/schemas/State"

    EngineError:
      type: object
      description: Error body for /deploy 400/422. Distinct from control-plane ErrorResponse.
      required: [error]
      properties:
        error:
          type: string

    DeployRequest:
      type: object
      description: >
        Engine-served POST /deploy body: a resolved workflow plus the network
        manifest. Distinct from the backend control-plane DeployRequestBody
        (DeploymentConfig/RedeployRequest). workflow is intentionally NOT
        required so it generates as a pointer (the handler nil-checks it).
      properties:
        workflow:
          $ref: "workflow.yaml#/components/schemas/Workflow"
        networkManifest:
          $ref: "#/components/schemas/NetworkManifest"

    NetworkManifest:
      type: object
      description: Resolved MQTT transports keyed by network ID, handed to the engine on deploy.
      required: [mqtts]
      properties:
        mqtts:
          type: object
          x-go-name: MQTTs
          description: Network ID -> resolved MQTT connection.
          additionalProperties:
            $ref: "#/components/schemas/MQTTConnection"

    MQTTConnection:
      type: object
      required: [brokerUrl]
      properties:
        brokerUrl:
          type: string
          x-go-name: BrokerURL
        clientId:
          type: string
          x-go-name: ClientID
        username:
          type: string
        password:
          type: string
          format: password
        publishPrefix:
          type: string
          x-go-name: PublishPrefix
          description: Topic prefix the engine prepends to workflow-level publish topics ({networkId}/{agentId}/).
        subscribePrefix:
          type: string
          x-go-name: SubscribePrefix
          description: Topic prefix the engine prepends to workflow-level subscribe filters ({networkId}/+/).
        will:
          $ref: "#/components/schemas/MQTTWill"

    MQTTWill:
      type: object
      required: [topic, payload, qos, retain]
      properties:
        topic:
          type: string
        payload:
          type: string
        qos:
          type: integer
          description: MQTT QoS (0,1,2). Cast to byte at the paho call site.
        retain:
          type: boolean

    # --- Control-plane wire types (no engine-served path; consumed by the
    #     fh-backend client implementation of the capability interfaces) ---

    ErrorResponse:
      type: object
      required: [message]
      properties:
        message:
          type: string

    PreflightErrorResponse:
      type: object
      description: |
        422 response body returned by any deploy-shaped operation
        (/agents/{agentId}/deploy, /agents/{agentId}/deployments,
        /agents/{agentId}/preflight) when the workflow's hardware or network
        requirements cannot be satisfied on the target agent's environment.
        Frontend uses missing[].reason to drive the resource-mapping dialog.
      required: [error, missing]
      properties:
        error:
          type: string
          description: Human-readable summary of the preflight failure.
        missing:
          type: array
          items:
            $ref: "#/components/schemas/MissingResource"

    MissingResource:
      type: object
      required: [family, id, reason]
      properties:
        family:
          type: string
          enum: [gpio, adc, dac, pwm, serial, network]
          x-go-name: Family
          description: Resource family. Hardware drivers (gpio/adc/dac/pwm/serial) live in DeviceManifest; network covers MQTT transport channels.
        id:
          type: string
          x-go-name: ID
          description: Driver instance ID (gpio/adc/dac/pwm/serial) or network UUID (network) the workflow asks for.
        reason:
          type: string
          enum:
            - not-in-manifest
            - device-not-member
            - network-not-found
            - wrong-protocol
            - invalid-config
            - missing-broker-url
            - invalid-credentials
            - missing-credentials
          x-go-name: Reason
        channels:
          type: array
          description: Workflow channel IDs that reference this missing resource.
          items:
            type: string

    EngineTarballResponse:
      type: object
      required: [url, sha256, expiresAt, version]
      properties:
        url:
          type: string
          format: uri
          description: V4 GCS Signed URL, valid for the duration encoded in expiresAt.
        sha256:
          type: string
          pattern: '^[a-f0-9]{64}$'
          description: Hex-encoded SHA256 of the tarball.
        expiresAt:
          type: string
          format: date-time
          description: RFC3339 timestamp when the signed URL stops being honored by GCS.
        version:
          type: string
          pattern: '^\d+\.\d+\.\d+(-[A-Za-z0-9.-]+)?$'
          description: Engine image version that this tarball delivers.

    DeviceManifest:
      type: object
      description: |
        Hardware resources available on the device, keyed by driver instance ID.
        Drives runtime driver instantiation on the engine.
      properties:
        gpios:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/GPIOConfig"
        adcs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ADCConfig"
        dacs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/DACConfig"
        serials:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SerialConfig"
        pwms:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/PWMConfig"

    DeviceResources:
      type: object
      required: [manifest, networks]
      properties:
        manifest:
          $ref: "#/components/schemas/DeviceManifest"
        networks:
          type: array
          items:
            $ref: "#/components/schemas/Network"

    GPIOConfig:
      type: object
      required: [chip]
      properties:
        chip:
          type: string
          minLength: 1
          description: cdev chip name or path, e.g. "gpiochip0" or "/dev/gpiochip0"

    ADCConfig:
      type: object
      required: [device]
      properties:
        device:
          type: string
          minLength: 1
          description: sysfs path to the IIO device directory, e.g. "/sys/bus/iio/devices/iio:device0"

    DACConfig:
      type: object
      required: [device]
      properties:
        device:
          type: string
          minLength: 1
          description: sysfs path to the IIO device directory, e.g. "/sys/bus/iio/devices/iio:device1"

    SerialConfig:
      type: object
      required: [device]
      properties:
        device:
          type: string
          minLength: 1
          description: Serial device path, e.g. "/dev/ttyUSB0" or "COM3"
        baud:
          type: integer
          description: Baud rate; falls back to 115200 when zero

    PWMConfig:
      type: object
      required: [chip]
      properties:
        chip:
          type: string
          minLength: 1
          description: sysfs path to the pwmchip directory, e.g. "/sys/class/pwm/pwmchip0"

    LogEntry:
      type: object
      required: [level, action, summary, msg, time]
      additionalProperties: true
      description: |
        Single log event emitted by the engine. The reserved keys
        (level/action/summary/msg/time) populate dedicated agent_activity
        columns; any extra top-level keys are bucketed into the details
        JSONB column on ingest.
      properties:
        level:
          type: string
          enum: [debug, info, warn, error, fatal]
        action:
          type: string
        summary:
          type: string
        msg:
          type: string
        time:
          type: string
          format: date-time

    NetworkConfig:
      description: |
        Tagged union of network connection configs. The `type` field is the
        single source of truth for the network's protocol — there is no
        separate top-level `protocol` field on Network. New protocols extend
        this oneOf with another arm.
      oneOf:
        - $ref: "#/components/schemas/MQTTNetworkConfig"
      discriminator:
        propertyName: type
        mapping:
          mqtt: "#/components/schemas/MQTTNetworkConfig"

    MQTTNetworkConfig:
      type: object
      description: Connection config stored on a network row whose protocol is mqtt.
      required: [type, brokerUrl, managedACL]
      properties:
        type:
          type: string
          enum: [mqtt]
        brokerUrl:
          type: string
          x-go-name: BrokerURL
          description: MQTT broker URL (mqtt:// or mqtts://). Required regardless of ACL ownership.
        managedACL:
          type: boolean
          x-go-name: ManagedACL
          description: Wether the broker uses the ForestHub provided MQTT broker with internal ACL management

    MembershipCredentials:
      description: Tagged union of credentials shapes a device can carry for one network membership.
      oneOf:
        - $ref: "#/components/schemas/NoCredentials"
        - $ref: "#/components/schemas/MQTTBYOBCredentials"
      discriminator:
        propertyName: type
        mapping:
          none: "#/components/schemas/NoCredentials"
          mqtt-byob: "#/components/schemas/MQTTBYOBCredentials"

    NoCredentials:
      type: object
      description: Sentinel "no credentials needed" arm of MembershipCredentials.
      required: [type]
      properties:
        type:
          type: string
          enum: [none]

    MQTTBYOBCredentials:
      type: object
      description: Credentials for an external (customer defined) MQTT broker.
      required: [type, username, password]
      properties:
        type:
          type: string
          enum: [mqtt-byob]
        clientId:
          type: string
          x-go-name: ClientID
        username:
          type: string
        password:
          type: string
          format: password

    AgentBootCallback:
      type: object
      required: [status]
      properties:
        address:
          type: string
          format: uri
          example: "http://10.0.1.50:8081"
          description: |
            Externally reachable HTTP(S) URL of the engine. Optional —
            Cloud-mode engines behind NAT may omit this; the backend then
            stores the address as SQL NULL and rejects push deploys for
            this agent, while bundle deploys and liveness still work.
        status:
          type: string
          enum: [online, booterror]
          description: |
            Boot result reported by the engine. 'online' when the manifest
            loaded cleanly and the engine is ready to accept deploy requests;
            'booterror' when something blocked startup (missing driver,
            invalid manifest, etc.).
        loadedDeviceManifest:
          $ref: "#/components/schemas/DeviceManifest"
          nullable: true
          description: |
            The manifest the engine loaded into its driver registry at boot.
            Set on a successful boot; may be null on booterror if the engine
            could not even parse the manifest.
        error:
          type: string
          nullable: true
          description: Human-readable failure detail. Set when status='booterror', null otherwise.

    AgentHeartbeatRequest:
      type: object
      properties:
        address:
          type: string
          format: uri
          example: "http://10.0.1.50:8081/"
          description: |
            Externally reachable HTTP(S) URL of the engine. Optional —
            Cloud-mode engines behind NAT may omit this; the heartbeat
            then only refreshes liveness via the AgentKeyAuth middleware
            without writing the address column.

    MemoryFileWrite:
      type: object
      description: Body of PUT /agents/memory/{name}.
      required: [content]
      properties:
        content:
          type: string

    DeploymentConfig:
      type: object
      description: Snapshot of what's deployed to an agent
      required: [workflow, projectId]
      properties:
        workflow:
          $ref: "workflow.yaml#/components/schemas/Workflow"
        projectId:
          type: string

    RedeployRequest:
      type: object
      description: |
        Reactivate a historical deployment by ID. Backend loads the workflow
        from agent_deployments.config and flips agents.active_deployment_id;
        no new deployment row is written.
      required: [deploymentId]
      properties:
        deploymentId:
          type: string
          format: uuid
          x-go-name: DeploymentID

    DeployRequestBody:
      description: |
        Body for /agents/{agentId}/deploy and /agents/{agentId}/deployments.
        DeploymentConfig is a fresh deploy (workflow + projectId); RedeployRequest
        reactivates a historical deployment by ID.
      oneOf:
        - $ref: "#/components/schemas/DeploymentConfig"
        - $ref: "#/components/schemas/RedeployRequest"

    AgentRuntimeStatusResponse:
      type: object
      required: [status]
      properties:
        status:
          type: string
          enum: [idle, running]

    RagQueryRequest:
      type: object
      required: [collectionId, query]
      properties:
        collectionId:
          type: string
          description: Collection to query
          x-go-name: CollectionID
        query:
          type: string
          maxLength: 10000
          description: Search query text
        topK:
          type: integer
          description: Number of results to return
          default: 5
          maximum: 100

    RagQueryResult:
      type: object
      required: [chunkId, documentId, content, score]
      properties:
        chunkId:
          type: string
          x-go-name: ChunkID
        documentId:
          type: string
          x-go-name: DocumentID
        content:
          type: string
        score:
          type: number
          format: double

    Network:
      type: object
      required: [id, accountId, name, config, deviceCount, agentCount, createdAt, updatedAt]
      properties:
        id:
          type: string
        accountId:
          type: string
          x-go-name: AccountID
        name:
          type: string
        description:
          type: string
          nullable: true
        config:
          $ref: "#/components/schemas/NetworkConfig"
        deviceCount:
          type: integer
          description: Number of devices currently in this network
        agentCount:
          type: integer
          description: Number of agents deployed on devices in this network
        createdAt:
          type: string
          format: date-time
        updatedAt:
          type: string
          format: date-time

