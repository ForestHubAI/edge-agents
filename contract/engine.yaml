openapi: 3.0.3
info:
  title: ForestHub Engine Deploy & Control-Plane Contract
  version: 0.1.0
  description: "The types the engine is handed at boot (config + secrets) plus the runtime requests it makes to the backend."

paths: {}
components:
  schemas:
    EngineConfig:
      type: object
      required: [workflow]
      description: "The engine's complete boot input, loaded once at startup."
      properties:
        workflow:
          $ref: "workflow.yaml#/components/schemas/Workflow"
        mapping:
          $ref: "#/components/schemas/ResourceMapping"
        externalResources:
          $ref: "#/components/schemas/ExternalResources"
        manifest:
          $ref: "#/components/schemas/DeviceManifest"

    ResourceMapping:
      type: object
      description: "Binds a binding-free workflow's logical resource ids to concrete platform resources, keyed by workflow resource id."
      additionalProperties:
        $ref: "#/components/schemas/ResourceAddress"

    ResourceAddress:
      type: object
      description: "Where one workflow resource resolves to: the shared platform resource `ref` it maps to, plus an optional sub-address selecting one served unit within it."
      required: [ref]
      properties:
        ref:
          type: string
          description: Shared platform resource id this binds to.
        index:
          type: integer
          description: Per-channel physical sub-address within a driver (GPIO line / ADC-PWM-DAC channel). Driver resources only.
        model:
          type: string
          description: Model name a shared inference endpoint (self-hosted LLM / ml-inference component) selects on for this binding. Required for endpoint bindings — the endpoint fronts several models and picks one by this name; omitted for driver/mqtt bindings.

    ExternalResources:
      type: object
      description: "Deploy-time configs for a workflow's non-device external resources (MQTT transports, custom-model providers, ...), keyed by platform resource id."
      additionalProperties:
        $ref: "#/components/schemas/ExternalResourceConfig"

    ExternalResourceConfig:
      description: "Tagged union of deploy-time external-resource configs, discriminated by runtime kind (not by ownership — locality like on-device vs cloud lives inside an arm). New kinds extend this oneOf."
      oneOf:
        - $ref: "#/components/schemas/MQTTConfig"
        - $ref: "#/components/schemas/LLMProviderConfig"
        - $ref: "#/components/schemas/MLInferenceConfig"
      discriminator:
        propertyName: type
        mapping:
          mqtt: "#/components/schemas/MQTTConfig"
          localLlm: "#/components/schemas/LLMProviderConfig"
          backendLlm: "#/components/schemas/LLMProviderConfig"
          selfhostedLlm: "#/components/schemas/LLMProviderConfig"
          ml-inference: "#/components/schemas/MLInferenceConfig"

    LLMProviderConfig:
      type: object
      description: "One LLM provider instance the engine registers into its single llmproxy; a workflow model reaches it by model id. localLlm: a built-in catalog adapter authenticated with a deploy-delivered API key (secrets.json, keyed by this resource's ref); `provider` names the adapter. backendLlm: that same catalog adapter's models proxied to the backend, no key; `provider` names the adapter. selfhostedLlm: a direct endpoint the llmproxy doesn't ship (`url`; optional bearer via secrets.json by ref), shared by every model bound to it. Each catalog provider is served by exactly one instance (localLlm xor backendLlm) — no catch-all, no shadowing."
      required: [type]
      properties:
        type:
          type: string
          enum: [localLlm, backendLlm, selfhostedLlm]
        provider:
          type: string
          description: localLlm / backendLlm only — the built-in catalog adapter this instance serves (e.g. anthropic, openai).
        url:
          type: string
          description: selfhostedLlm only — base URL of the inference endpoint (http:// or https://).

    MLInferenceConfig:
      type: object
      description: "Resolved connection to an ML inference component the engine doesn't ship: a separate service reached by URL that loads a repository of models and serves them over HTTP. The engine names a model on each request; which one is the binding's `model` sub-address (ResourceAddress.model), so many models may share one endpoint. A trusted in-deployment endpoint — no credential."
      required: [type, url]
      properties:
        type:
          type: string
          enum: [ml-inference]
        url:
          type: string
          description: Base URL of the inference component (http:// or https://).

    MQTTConfig:
      type: object
      description: "Resolved connection metadata for an MQTT broker."
      required: [type, brokerUrl]
      properties:
        type:
          type: string
          enum: [mqtt]
        brokerUrl:
          type: string
          x-go-name: BrokerURL
        clientId:
          type: string
          x-go-name: ClientID
        username:
          type: string
        publishPrefix:
          type: string
          x-go-name: PublishPrefix
          description: Topic prefix for workflow-level publish topics ({networkId}/{agentId}/).
        subscribePrefix:
          type: string
          x-go-name: SubscribePrefix
          description: Topic prefix for workflow-level subscribe filters ({networkId}/+/).
        will:
          $ref: "#/components/schemas/MQTTWill"

    MQTTWill:
      type: object
      required: [topic, payload, qos, retain]
      properties:
        topic:
          type: string
        payload:
          type: string
        qos:
          type: integer
          description: MQTT QoS (0, 1, or 2).
        retain:
          type: boolean

    DeviceManifest:
      type: object
      description: "Hardware resources available on the device, keyed by driver instance ID."
      properties:
        gpios:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/GPIOConfig"
        adcs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ADCConfig"
        dacs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/DACConfig"
        serials:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SerialConfig"
        pwms:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/PWMConfig"
        cameras:
          type: object
          additionalProperties:
            $ref: "camera.yaml#/components/schemas/CameraSource"

    GPIOConfig:
      type: object
      required: [chip]
      properties:
        chip:
          type: string
          minLength: 1
          description: cdev chip name or path, e.g. "gpiochip0" or "/dev/gpiochip0"

    ADCConfig:
      type: object
      required: [device]
      properties:
        device:
          type: string
          minLength: 1
          description: sysfs path to the IIO device directory, e.g. "/sys/bus/iio/devices/iio:device0"

    DACConfig:
      type: object
      required: [device]
      properties:
        device:
          type: string
          minLength: 1
          description: sysfs path to the IIO device directory, e.g. "/sys/bus/iio/devices/iio:device1"

    SerialConfig:
      type: object
      required: [device]
      properties:
        device:
          type: string
          minLength: 1
          description: Serial device path, e.g. "/dev/ttyUSB0" or "COM3"
        baud:
          type: integer
          description: Baud rate; falls back to 115200 when zero

    PWMConfig:
      type: object
      required: [chip]
      properties:
        chip:
          type: string
          minLength: 1
          description: sysfs path to the pwmchip directory, e.g. "/sys/class/pwm/pwmchip0"

    RagQueryRequest:
      type: object
      required: [collectionId, query]
      properties:
        collectionId:
          type: string
          description: Collection to query
          x-go-name: CollectionID
        query:
          type: string
          maxLength: 10000
          description: Search query text
        topK:
          type: integer
          description: Number of results to return
          default: 5
          maximum: 100

    RagQueryResult:
      type: object
      required: [chunkId, documentId, content, score]
      properties:
        chunkId:
          type: string
          x-go-name: ChunkID
        documentId:
          type: string
          x-go-name: DocumentID
        content:
          type: string
        score:
          type: number
          format: double
