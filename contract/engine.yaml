openapi: 3.0.3
info:
  title: ForestHub Engine Deploy & Control-Plane Contract
  version: 0.1.0
  description: "The types the engine is handed at boot (config + secrets) plus the runtime requests it makes to the backend."

paths: {}
components:
  schemas:
    EngineConfig:
      type: object
      required: [workflow]
      description: "The engine's complete boot input, loaded once at startup."
      properties:
        workflow:
          $ref: "workflow.yaml#/components/schemas/Workflow"
        mapping:
          $ref: "#/components/schemas/ResourceMapping"
        externalResources:
          $ref: "#/components/schemas/ExternalResources"
        manifest:
          $ref: "#/components/schemas/DeviceManifest"

    EngineSecrets:
      type: object
      description: "The engine's secret store: a flat map of secret id -> opaque secret value."
      additionalProperties:
        type: string

    ResourceMapping:
      type: object
      description: "Binds a binding-free workflow's logical resource ids to concrete platform resources, keyed by workflow resource id."
      additionalProperties:
        $ref: "#/components/schemas/ResourceBinding"

    ResourceBinding:
      type: object
      description: "How one workflow resource binds to the environment: a shared platform resource `ref` with an optional per-channel physical sub-address `index`."
      required: [ref]
      properties:
        ref:
          type: string
          description: Shared platform resource id this binds to.
        index:
          type: integer
          description: Per-channel physical sub-address within the driver (GPIO line / ADC-PWM-DAC channel). Omitted when the resource has no sub-address.

    ExternalResources:
      type: object
      description: "Deploy-time configs for a workflow's non-device external resources (MQTT transports, custom-model providers, ...), keyed by platform resource id."
      additionalProperties:
        $ref: "#/components/schemas/ExternalResourceConfig"

    ExternalResourceConfig:
      description: "Tagged union of deploy-time external-resource configs, discriminated by runtime kind (not by ownership — locality like on-device vs cloud lives inside an arm). New kinds extend this oneOf."
      oneOf:
        - $ref: "#/components/schemas/MQTTConnection"
        - $ref: "#/components/schemas/LLMProviderConfig"
      discriminator:
        propertyName: type
        mapping:
          mqtt: "#/components/schemas/MQTTConnection"
          selfhosted: "#/components/schemas/LLMProviderConfig"

    LLMProviderConfig:
      type: object
      description: "Resolved connection to a self-hosted/custom LLM endpoint the llmproxy doesn't ship."
      required: [type, url]
      properties:
        type:
          type: string
          enum: [selfhosted]
        url:
          type: string
          description: Base URL of the inference endpoint (http:// or https://).
        model:
          type: string
          description: Upstream model name the endpoint serves; defaults to the workflow model id when empty.

    MQTTConnection:
      type: object
      description: "Resolved connection metadata for an MQTT broker."
      required: [type, brokerUrl]
      properties:
        type:
          type: string
          enum: [mqtt]
        brokerUrl:
          type: string
          x-go-name: BrokerURL
        clientId:
          type: string
          x-go-name: ClientID
        username:
          type: string
        publishPrefix:
          type: string
          x-go-name: PublishPrefix
          description: Topic prefix for workflow-level publish topics ({networkId}/{agentId}/).
        subscribePrefix:
          type: string
          x-go-name: SubscribePrefix
          description: Topic prefix for workflow-level subscribe filters ({networkId}/+/).
        will:
          $ref: "#/components/schemas/MQTTWill"

    MQTTWill:
      type: object
      required: [topic, payload, qos, retain]
      properties:
        topic:
          type: string
        payload:
          type: string
        qos:
          type: integer
          description: MQTT QoS (0, 1, or 2).
        retain:
          type: boolean

    DeviceManifest:
      type: object
      description: "Hardware resources available on the device, keyed by driver instance ID."
      properties:
        gpios:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/GPIOConfig"
        adcs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ADCConfig"
        dacs:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/DACConfig"
        serials:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/SerialConfig"
        pwms:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/PWMConfig"

    GPIOConfig:
      type: object
      required: [chip]
      properties:
        chip:
          type: string
          minLength: 1
          description: cdev chip name or path, e.g. "gpiochip0" or "/dev/gpiochip0"

    ADCConfig:
      type: object
      required: [device]
      properties:
        device:
          type: string
          minLength: 1
          description: sysfs path to the IIO device directory, e.g. "/sys/bus/iio/devices/iio:device0"

    DACConfig:
      type: object
      required: [device]
      properties:
        device:
          type: string
          minLength: 1
          description: sysfs path to the IIO device directory, e.g. "/sys/bus/iio/devices/iio:device1"

    SerialConfig:
      type: object
      required: [device]
      properties:
        device:
          type: string
          minLength: 1
          description: Serial device path, e.g. "/dev/ttyUSB0" or "COM3"
        baud:
          type: integer
          description: Baud rate; falls back to 115200 when zero

    PWMConfig:
      type: object
      required: [chip]
      properties:
        chip:
          type: string
          minLength: 1
          description: sysfs path to the pwmchip directory, e.g. "/sys/class/pwm/pwmchip0"

    RagQueryRequest:
      type: object
      required: [collectionId, query]
      properties:
        collectionId:
          type: string
          description: Collection to query
          x-go-name: CollectionID
        query:
          type: string
          maxLength: 10000
          description: Search query text
        topK:
          type: integer
          description: Number of results to return
          default: 5
          maximum: 100

    RagQueryResult:
      type: object
      required: [chunkId, documentId, content, score]
      properties:
        chunkId:
          type: string
          x-go-name: ChunkID
        documentId:
          type: string
          x-go-name: DocumentID
        content:
          type: string
        score:
          type: number
          format: double
