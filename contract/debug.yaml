# ForestHub Engine Debug Protocol — part of the ForestHub contract. SOURCE OF TRUTH.
# Generated by the contract split (PLAN.md). $refs workflow.yaml (one-directional).
openapi: 3.0.3
info:
  title: ForestHub Engine Debug Protocol
  version: 0.1.0
  description: Engine<->editor debug-adapter protocol.
paths: {}
components:
  schemas:

    DebugRequest:
      type: object
      required: [workflow]
      properties:
        workflow:
          $ref: "workflow.yaml#/components/schemas/Workflow"

    DebugStepRequest:
      type: object
      required: [context, externalState]
      properties:
        nodeId:
          type: string
          description: Node to execute. If provided, sets the cursor first (debug from here). If omitted, executes the current cursor node.
        context:
          type: object
          additionalProperties: true
          description: Workflow variable values
        externalState:
          $ref: "#/components/schemas/DebugExternalState"

    DebugExternalState:
      type: object
      description: Pre-populated hardware I/O values for the debug binary
      properties:
        gpio:
          type: object
          description: 'Pin number to value map (e.g. {"4": 1, "5": 0})'
          additionalProperties:
            type: integer
        serial:
          type: array
          description: Serial input buffer, consumed in order
          items:
            type: string

    DebugStepResult:
      type: object
      required: [executedNode, nextNode, context]
      properties:
        executedNode:
          type: string
        nextNode:
          type: string
          description: Next node to execute. Empty string if execution reached idle.
        context:
          type: object
          additionalProperties: true
          description: Updated workflow variable values after execution

    DebugEvent:
      oneOf:
        - $ref: "#/components/schemas/DebugReadyEvent"
        - $ref: "#/components/schemas/DebugMessageEvent"
        - $ref: "#/components/schemas/DebugErrorEvent"
      discriminator:
        propertyName: type
        mapping:
          ready: "#/components/schemas/DebugReadyEvent"
          message: "#/components/schemas/DebugMessageEvent"
          error: "#/components/schemas/DebugErrorEvent"

    DebugReadyEvent:
      type: object
      required: [type, sessionId]
      properties:
        type:
          type: string
          enum: [ready]
        sessionId:
          type: string
          description: Session ID for subsequent requests

    DebugMessageEvent:
      type: object
      required: [type, text]
      properties:
        type:
          type: string
          enum: [message]
        text:
          type: string

    DebugErrorEvent:
      type: object
      required: [type, message]
      properties:
        type:
          type: string
          enum: [error]
        message:
          type: string

