openapi: 3.0.3
info:
  title: ForestHub ML Component Contract
  version: 0.1.0
  description: "Engine<->ML-component inference wire. The component (image fh-onnx, service onnx) is a model repository — one container loads many model bundles and serves them all; a request selects one by name in the path. Inference splits by input kind: an opaque encoded artifact the component decodes itself (binary), or already-numeric tensors the caller prepared (tensors). The result is task-shaped and generic, so a new model type needs only a handler, not a contract change. Source of truth for the engine's generated client and the component's generated Pydantic models."

paths:
  /models:
    get:
      operationId: listModels
      summary: List the loaded models.
      description: "Every model the repository loaded at startup — the names valid as the `model` in an inference path, each with its handler, task, and optional version."
      responses:
        "200":
          description: The repository's loaded models.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/RepositoryMetadata"

  /models/{model}:
    get:
      operationId: modelMetadata
      summary: Describe one loaded model.
      description: "Metadata for the path-named model — its handler, task, and optional version. The task advertises the result shape an inference will return, so a caller can check it without running one."
      parameters:
        - $ref: "#/components/parameters/Model"
      responses:
        "200":
          description: The model's metadata.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ModelMetadata"
        "404":
          $ref: "#/components/responses/UnknownModel"

  /models/{model}/infer/binary:
    post:
      operationId: inferBinary
      summary: Run inference from an opaque encoded input (e.g. an image).
      description: "Feeds the raw request body to the path-named model as an opaque encoded artifact — an image or any blob the model's handler decodes itself. The body is the artifact and nothing else: the model is in the path, so no envelope and no per-request options. An unknown model yields 404; a body the handler cannot decode yields 422; a body over the size limit yields 413."
      parameters:
        - $ref: "#/components/parameters/Model"
      requestBody:
        required: true
        content:
          application/octet-stream:
            schema:
              type: string
              format: binary
      responses:
        "200":
          $ref: "#/components/responses/Inference"
        "404":
          $ref: "#/components/responses/UnknownModel"
        "413":
          $ref: "#/components/responses/TooLarge"
        "422":
          $ref: "#/components/responses/Unprocessable"
        "500":
          $ref: "#/components/responses/HandlerError"

  /models/{model}/infer/tensors:
    post:
      operationId: inferTensors
      summary: Run inference from named numeric tensors.
      description: "Feeds already-numeric named tensors to the path-named model — for models whose input the caller prepares directly, with no decoding on the component side. An unknown model yields 404; tensors the handler cannot use yield 422."
      parameters:
        - $ref: "#/components/parameters/Model"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/TensorInput"
      responses:
        "200":
          $ref: "#/components/responses/Inference"
        "404":
          $ref: "#/components/responses/UnknownModel"
        "422":
          $ref: "#/components/responses/Unprocessable"
        "500":
          $ref: "#/components/responses/HandlerError"

  /healthz:
    get:
      operationId: healthz
      summary: Liveness — the process is up.
      description: "Always 200 while the process is alive. Says nothing about whether models are loaded; use /readyz for that."
      responses:
        "200":
          description: The process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /readyz:
    get:
      operationId: readyz
      summary: Readiness — the model repository finished loading.
      description: "200 only once the repository is loaded and inference can be served; 503 while the repository is still loading or empty."
      responses:
        "200":
          description: The repository is loaded and inference can be served.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          description: The repository is not yet loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

components:
  parameters:
    Model:
      name: model
      in: path
      required: true
      description: "Name (id) of the loaded model — a loaded bundle (a sub-folder of the models repository). See GET /models for valid names."
      schema:
        type: string

  responses:
    Inference:
      description: Inference result.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/InferResult"
    UnknownModel:
      description: No model with the requested name is loaded.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    TooLarge:
      description: The request body exceeds the component's size limit.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    Unprocessable:
      description: The input could not be processed by the selected model's handler.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"
    HandlerError:
      description: The handler failed unexpectedly while running inference.
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/Error"

  schemas:
    MLConfig:
      type: object
      description: "The ML component's boot config: the models this component is issued. Authoritative — the component loads exactly these bundles from its workspace repository, so a declared bundle that is missing or unloadable is a permanent boot failure and an undeclared sub-folder is ignored. A projection of the deployment's device-located ML models, not an authored artifact: the renderer writes it, the component reads it at boot from the contracted config path. A cross-language seam. Not on the HTTP wire; carried here so the renderer (producer) and component (consumer) share one generated shape. Says WHICH models load and what the deployment overrides — never how a model is driven, which stays in the bundle's own manifest.yaml beside the weights."
      required: [models]
      properties:
        models:
          type: object
          description: "Models to load, keyed by model id — the bundle sub-folder name in the workspace repository, and the `model` in an inference path."
          additionalProperties:
            $ref: "#/components/schemas/MLModelConfig"

    MLModelConfig:
      type: object
      description: "Deployment-level settings for one issued model. The bundle itself — weights, handler binding, default params — is staged in the workspace and self-described by its manifest.yaml; only what the deployment decides appears here. Empty is valid and usual: it declares the model must load, nothing more."
      properties:
        params:
          x-go-type-skip-optional-pointer: true
          type: object
          description: "Deployment overrides merged over the bundle manifest's params. Precedence, lowest to highest: manifest params, these, then a request's params."
          additionalProperties: true

    Task:
      type: string
      description: "What a model does, and therefore the shape of its result. The unit of normalization across implementations: two object-detection models return the same shape whatever their architecture. `tensor` is the general escape — raw model outputs, for a model whose task this contract does not model."
      enum: [object-detection, image-classification, tensor]

    Tensor:
      type: object
      description: "One typed tensor in the KServe/OIP v2 representation: an explicit `datatype` and `shape` over a flat, row-major `data` array. Self-describing — a consumer reconstructs the array with no out-of-band shape knowledge — and used for both raw model inputs and raw model outputs."
      required: [datatype, shape, data]
      properties:
        datatype:
          type: string
          description: "Element type, in KServe/OIP spelling (FP32, INT64, UINT8, BOOL, BYTES, ...)."
          enum: [BOOL, UINT8, UINT16, UINT32, UINT64, INT8, INT16, INT32, INT64, FP16, FP32, FP64, BYTES]
        shape:
          type: array
          description: "Tensor dimensions, outermost first."
          items:
            type: integer
        data:
          type: array
          description: "Elements flattened row-major (C order); length equals the product of `shape`. Numbers for the numeric datatypes."
          items: {}

    TensorInput:
      type: object
      description: "Named input tensors keyed by the model's input feed names — one `Tensor` per model input. Already-numeric input the caller prepared, mapped straight onto the ONNX inputs with no decoding on the component side."
      additionalProperties:
        $ref: "#/components/schemas/Tensor"

    InferResult:
      description: "A task-shaped inference result. Discriminated by `task`, which always equals the producing model's advertised task, so a consumer can decode without knowing the model."
      oneOf:
        - $ref: "#/components/schemas/DetectionResult"
        - $ref: "#/components/schemas/ClassificationResult"
        - $ref: "#/components/schemas/TensorResult"
      discriminator:
        propertyName: task
        mapping:
          object-detection: "#/components/schemas/DetectionResult"
          image-classification: "#/components/schemas/ClassificationResult"
          tensor: "#/components/schemas/TensorResult"

    DetectionResult:
      type: object
      description: "Objects located in the input image. Already filtered and de-duplicated by the model's decoder — a consumer renders or counts these, it does not post-process them further."
      required: [task, detections]
      properties:
        task:
          type: string
          enum: [object-detection]
        detections:
          type: array
          description: "The surviving detections, ordered by descending score."
          items:
            $ref: "#/components/schemas/Detection"

    Detection:
      type: object
      description: One located object.
      required: [label, score, box]
      properties:
        label:
          type: string
          description: "Human-readable class name, resolved through the model's label map."
        score:
          type: number
          description: Confidence in [0, 1].
        classId:
          x-go-type-skip-optional-pointer: true
          type: integer
          description: "Raw class index the model emitted, before label resolution. Absent when the decoder has no meaningful index."
        box:
          $ref: "#/components/schemas/Box"

    Box:
      type: object
      description: "An axis-aligned box in ORIGINAL input-image pixel coordinates — the decoder projects out of whatever letterboxed or rescaled space the model worked in, so a consumer never needs the preprocessing geometry."
      required: [xmin, ymin, xmax, ymax]
      properties:
        xmin:
          type: number
        ymin:
          type: number
        xmax:
          type: number
        ymax:
          type: number

    ClassificationResult:
      type: object
      description: What the input image depicts, as ranked candidate classes.
      required: [task, predictions]
      properties:
        task:
          type: string
          enum: [image-classification]
        predictions:
          type: array
          description: "Candidate classes, ordered by descending score."
          items:
            $ref: "#/components/schemas/Classification"

    Classification:
      type: object
      description: One candidate class for the whole input.
      required: [label, score]
      properties:
        label:
          type: string
          description: "Human-readable class name, resolved through the model's label map."
        score:
          type: number
          description: Confidence in [0, 1].
        classId:
          x-go-type-skip-optional-pointer: true
          type: integer
          description: "Raw class index the model emitted, before label resolution."

    TensorResult:
      type: object
      description: "Raw model outputs, undecoded. The general escape for a model whose task this contract does not model — the caller owns interpreting these."
      required: [task, tensors]
      properties:
        task:
          type: string
          enum: [tensor]
        tensors:
          x-go-type-skip-optional-pointer: true
          type: object
          description: "Output tensors keyed by the model's output names, one `Tensor` each."
          additionalProperties:
            $ref: "#/components/schemas/Tensor"

    RepositoryMetadata:
      type: object
      description: The set of models the component currently has loaded.
      required: [models]
      properties:
        models:
          type: array
          description: Every model loaded into the repository.
          items:
            $ref: "#/components/schemas/ModelMetadata"

    ModelMetadata:
      type: object
      description: Descriptive metadata for one loaded model.
      required: [name, handler, task]
      properties:
        name:
          type: string
          description: "Name (id) of the model — the value to use as the `model` in an inference path."
        handler:
          type: string
          description: "Handler driving the model: `builtin:<name>` or `file:handler.py`."
        task:
          $ref: "#/components/schemas/Task"
        modelVersion:
          x-go-type-skip-optional-pointer: true
          type: string
          description: Optional model/bundle version string.

    Health:
      type: object
      description: A simple health-probe response.
      required: [status]
      properties:
        status:
          type: string
          description: "Probe status (e.g. ok, loading)."

    Error:
      type: object
      description: A structured error response.
      required: [message]
      properties:
        message:
          type: string
          description: Human-readable error description.
