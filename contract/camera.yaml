openapi: 3.0.3
info:
  title: ForestHub Camera Component Contract
  version: 0.1.0
  description: "Engine<->camera component wire. One container owns several named cameras and each /capture request names which to read. The wire is modality-neutral: a server returns encoded frames for its modality. Source of truth for the engine's generated client and the component's generated server."

paths:
  /capture:
    get:
      operationId: capture
      summary: Capture one frame from a configured device, selected by name.
      description: "Reads a single frame from the named device. Unknown name yields 404; a capture failure yields 500."
      parameters:
        - name: name
          in: query
          required: true
          description: Name of the configured device to read (see /metadata).
          schema:
            type: string
        - name: width
          in: query
          required: false
          description: Optional width hint in pixels; ignored by sources that lack it.
          schema:
            type: integer
            minimum: 1
        - name: height
          in: query
          required: false
          description: Optional height hint in pixels; ignored by sources that lack it.
          schema:
            type: integer
            minimum: 1
      responses:
        "200":
          description: "Encoded captured frame (opaque binary; the concrete Content-Type is set by the server, e.g. image/jpeg for a camera server)."
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "404":
          description: No device with the requested name is configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"
        "500":
          description: The device failed to capture a frame.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /healthz:
    get:
      operationId: healthz
      summary: Liveness — the process is up.
      description: Always 200 while the process is alive; use /readyz for config state.
      responses:
        "200":
          description: The process is alive.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"

  /readyz:
    get:
      operationId: readyz
      summary: Readiness — the device configuration finished loading.
      description: 200 once the configuration is loaded; 503 while still loading or empty.
      responses:
        "200":
          description: The configuration is loaded and capture can be served.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Health"
        "503":
          description: The configuration is not yet loaded.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Error"

  /metadata:
    get:
      operationId: metadata
      summary: List the configured cameras.
      description: Names every configured camera — the valid /capture name selectors.
      responses:
        "200":
          description: The component's configured cameras.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CameraMetadata"

components:
  schemas:
    CameraMetadata:
      type: object
      description: The set of configured cameras.
      required: [devices]
      properties:
        devices:
          type: array
          description: Every configured camera.
          items:
            $ref: "#/components/schemas/DeviceMetadata"

    DeviceMetadata:
      type: object
      description: Descriptive metadata for one configured camera.
      required: [name]
      properties:
        name:
          type: string
          description: Name (id) of the camera — the /capture name selector.
        description:
          x-go-type-skip-optional-pointer: true
          type: string
          description: Optional human-readable device description.

    CameraConfig:
      type: object
      description: "The camera component's boot config (cameras.json): the set of cameras one shared camera component owns. The renderer writes it into the component's config file; the component reads it at boot — a cross-language seam. Each /capture request selects a camera by its key here. Not on the HTTP wire; the component's boot input, carried here so the renderer (producer) and component (consumer) share one generated shape."
      required: [cameras]
      properties:
        cameras:
          type: object
          description: "Configured cameras keyed by name — the /capture `name` selector."
          additionalProperties:
            $ref: "#/components/schemas/CameraSource"

    CameraSource:
      type: object
      description: "One camera's capture source in cameras.json."
      required: [source, device]
      properties:
        source:
          type: string
          description: "Capture backend: `v4l2` (a /dev/video* device) or `gstreamer` (a source element, e.g. libcamerasrc). Determines how `device` is interpreted."
        device:
          type: string
          description: "The capture source: a /dev/video* path (v4l2) or a GStreamer source fragment (gstreamer)."
        warmupFrames:
          type: integer
          minimum: 0
          x-go-type-skip-optional-pointer: true
          description: "Leading frames to discard so a sensor's auto-exposure can settle before the returned one. Default 0."
        setup:
          type: array
          x-go-type-skip-optional-pointer: true
          description: "Shell commands (media-ctl/v4l2-ctl) the component replays on every container start, for statically configured CSI/ISP pipelines."
          items:
            type: string

    Health:
      type: object
      description: A simple health-probe response.
      required: [status]
      properties:
        status:
          type: string
          description: "Probe status (e.g. ok, loading)."

    Error:
      type: object
      description: A structured error response.
      required: [message]
      properties:
        message:
          type: string
          description: Human-readable error description.
