version: 2

updates:
  # Go module (root of Go code is /go)
  - package-ecosystem: "gomod"
    directory: "/go"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    groups:
      go-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      go-security:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"

  # npm workspace root (handles workflow-core, workflow-builder, app)
  - package-ecosystem: "npm"
    directory: "/ts"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      prefix-development: "chore"
      include: "scope"
    groups:
      npm-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      npm-security:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"

  # GitHub Actions workflows
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    commit-message:
      prefix: "chore"
      include: "scope"
    groups:
      actions-minor-and-patch:
        applies-to: version-updates
        update-types:
          - "minor"
          - "patch"
      actions-security:
        applies-to: security-updates
        update-types:
          - "minor"
          - "patch"
