name: Bug Report
description: Report a bug in Edge Agents
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug. Please fill out the sections below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the bug.
      placeholder: Describe the bug...
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part of Edge Agents is affected?
      options:
        - Engine (Go runtime)
        - LLM proxy (Go)
        - Contract (OpenAPI schemas)
        - workflow-core (TS)
        - workflow-builder (TS, visual canvas)
        - workflow-cli / fh-workflow CLI (TS)
        - skills
        - Other / not sure
    validations:
      required: true

  - type: textarea
    id: reproduction
    attributes:
      label: Steps to Reproduce
      description: How can we reproduce this bug?
      placeholder: |
        1. ...
        2. ...
        3. Observe error...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What did you expect to happen?
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened?
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Which version or git commit of Edge Agents are you on?
      placeholder: "e.g. go/v0.1.0, or commit abc1234"
    validations:
      required: false

  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: OS, Go version, Node version, browser, etc. (whatever is relevant).
      placeholder: |
        - OS: Ubuntu 24.04
        - Go: 1.25
        - Node: 20.x
    validations:
      required: false
