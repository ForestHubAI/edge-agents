name: Feature Request
description: Suggest a new feature for edge-agents
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for your feature request. Please describe your idea below.

  - type: textarea
    id: description
    attributes:
      label: Description
      description: A clear description of the feature you'd like to see.
      placeholder: Describe the feature...
    validations:
      required: true

  - type: textarea
    id: use-case
    attributes:
      label: Use Case
      description: What problem does this feature solve? Why is it needed?
      placeholder: I need this because...
    validations:
      required: true

  - type: textarea
    id: proposed-solution
    attributes:
      label: Proposed Solution
      description: How do you think this should work?
    validations:
      required: false

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: Have you considered any alternative approaches?
    validations:
      required: false

  - type: dropdown
    id: component
    attributes:
      label: Component
      description: Which part(s) of edge-agents does this affect?
      multiple: true
      options:
        - Engine (Go runtime)
        - LLM proxy (Go)
        - Contract (OpenAPI schemas)
        - workflow-core (TS)
        - workflow-builder (TS, visual canvas)
        - workflow-cli / fh-workflow CLI (TS)
        - skills
        - Other / not sure
    validations:
      required: true
