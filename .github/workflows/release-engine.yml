name: Release engine image

# Manual-only. Triggering workflow_dispatch requires WRITE access to the repo,
# so only org members granted write can publish — public users / forkers cannot.
# Nothing fires on push or tag; you cut an image only when you run this.
on:
  workflow_dispatch:
    inputs:
      version:
        description: "Image version, no prefix (e.g. 1.2.0). Published as ghcr.io/foresthubai/engine:<version>."
        required: true
        type: string
      platforms:
        description: "Comma-separated build targets."
        required: true
        default: "linux/amd64,linux/arm64"
        type: string

permissions:
  contents: read
  packages: write # to push the image to GHCR

env:
  IMAGE: ghcr.io/foresthubai/engine

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - name: Validate version
        run: |
          if [[ ! "${{ inputs.version }}" =~ ^[0-9]+\.[0-9]+\.[0-9]+$ ]]; then
            echo "::error::version must be semver X.Y.Z, got '${{ inputs.version }}'"
            exit 1
          fi

      - uses: docker/setup-qemu-action@v3 # emulation for cross-arch targets
      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Refuse to clobber an already-published version
        run: |
          if docker buildx imagetools inspect "${IMAGE}:${{ inputs.version }}" >/dev/null 2>&1; then
            echo "::error::${IMAGE}:${{ inputs.version }} already exists in the registry"
            exit 1
          fi

      - name: Build and push
        uses: docker/build-push-action@v6
        with:
          context: go
          file: go/Dockerfile
          platforms: ${{ inputs.platforms }}
          push: true
          provenance: true
          tags: ${{ env.IMAGE }}:${{ inputs.version }}
          labels: |
            org.opencontainers.image.source=${{ github.server_url }}/${{ github.repository }}
            org.opencontainers.image.revision=${{ github.sha }}
            org.opencontainers.image.version=${{ inputs.version }}
