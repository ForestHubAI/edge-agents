name: Release container

# Builds and publishes the multi-arch engine container to GHCR on every
# `go/vX.Y.Z` tag — the same tag that releases the Go module (see RELEASING.md).
# Image: ghcr.io/foresthubai/edge-agents/engine
#
# Triggered manually via workflow_dispatch for one-off rebuilds, but the
# canonical path is `git tag go/vX.Y.Z && git push origin go/vX.Y.Z`.

on:
  push:
    tags: ['go/v*']
  workflow_dispatch:
    inputs:
      tag:
        description: 'Override image tag (default: derived from ref / sha)'
        required: false
        type: string

permissions:
  contents: read
  packages: write
  id-token: write       # cosign keyless OIDC + provenance attestations
  attestations: write   # actions/attest-* writes to the attestation store

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: foresthubai/edge-agents/engine

jobs:
  build-and-push:
    name: Build, push, sign (linux/amd64,arm64)
    runs-on: ubuntu-latest
    outputs:
      digest: ${{ steps.build.outputs.digest }}
      tags: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Strips the `go/` prefix from `refs/tags/go/v1.2.3` so the image gets
      # `1.2.3`, `1.2`, `1`, and `latest` rather than literally `go-v1.2.3`.
      - name: Compute image tags + labels
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=match,pattern=go/(v.*),group=1
            type=match,pattern=go/v(\d+\.\d+\.\d+),group=1
            type=match,pattern=go/v(\d+\.\d+)\.\d+,group=1
            type=match,pattern=go/v(\d+)\.\d+\.\d+,group=1
            type=raw,value=latest,enable={{is_default_branch}}
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/go/v') }}
            type=raw,value=${{ inputs.tag }},enable=${{ inputs.tag != '' }}
          labels: |
            org.opencontainers.image.title=ForestHub edge-agents engine
            org.opencontainers.image.description=Workflow runtime for embedded and edge AI agents.
            org.opencontainers.image.vendor=ForestHub
            org.opencontainers.image.licenses=AGPL-3.0-only
            org.opencontainers.image.source=https://github.com/${{ github.repository }}
            org.opencontainers.image.url=https://github.com/${{ github.repository }}
            org.opencontainers.image.documentation=https://github.com/${{ github.repository }}#readme

      - name: Build and push
        id: build
        uses: docker/build-push-action@v6
        with:
          context: go
          file: go/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      # Keyless signing — uses the GitHub OIDC token, no long-lived secret.
      # Signs by digest so every tag pointing at this build is covered.
      - name: Sign image
        env:
          DIGEST: ${{ steps.build.outputs.digest }}
          TAGS: ${{ steps.meta.outputs.tags }}
        run: |
          set -euo pipefail
          for tag in $TAGS; do
            ref="${tag%:*}@${DIGEST}"
            echo "cosign sign $ref"
            cosign sign --yes "$ref"
          done

      - name: Attest build provenance
        uses: actions/attest-build-provenance@v2
        with:
          subject-name: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          subject-digest: ${{ steps.build.outputs.digest }}
          push-to-registry: true
