# Toy "consumer repo" spec. Simulates fh-backend AFTER the split: it does
# NOT $ref ../contract/workflow.yaml (that file isn't in the go-module zip).
# Instead it declares a local stub schema annotated with x-go-type +
# x-go-type-import so oapi-codegen substitutes the SHARED type from the
# tagged fh-core/go module instead of regenerating a duplicate.
openapi: 3.0.3
info:
  title: Toy Consumer API
  version: 0.0.0
paths: {}
components:
  schemas:
    # Case A: a named schema mapped to the imported type, referenced via $ref
    # (this is exactly fh-backend's DeploymentConfig.workflow shape).
    SharedWorkflow:
      x-go-type: workflow.Workflow
      x-go-type-import:
        path: github.com/ForestHubAI/fh-core/go/api/workflow
        name: workflow
      type: object
      description: Stub — body ignored for Go codegen; kept so the doc is valid OpenAPI.

    DeploymentConfig:
      type: object
      required: [projectId, workflow]
      properties:
        projectId:
          type: string
        workflow:
          $ref: '#/components/schemas/SharedWorkflow'

    # Case B: inline property override (no intermediate named schema).
    DebugRequest:
      type: object
      required: [workflow]
      properties:
        workflow:
          x-go-type: workflow.Workflow
          x-go-type-import:
            path: github.com/ForestHubAI/fh-core/go/api/workflow
            name: workflow
          type: object
