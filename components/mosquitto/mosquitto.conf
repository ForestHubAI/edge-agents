# ForestHub MQTT broker component — static broker configuration.
#
# Auth and topic ACL are enforced locally by mosquitto from two files the
# entrypoint renders at boot: `passwd` (per-device password hashes) and `acl`
# (the topic grammar). There is no auth plugin and no backend callback — the
# broker authorizes every CONNECT and PUB/SUB offline, so it keeps working under
# a cloud partition. See ACL.md for the grammar.

listener 1883
protocol mqtt
allow_anonymous false

# Rendered at boot by entrypoint.sh from config.json (roster) + secrets.json
# (per-device hash). Never committed — device-local, regenerated every deploy.
password_file /mosquitto/config/passwd
acl_file /mosquitto/config/acl

# Durable state (retained messages, subscriptions) in the component workspace,
# persisted across deployments (contract/component-constants.json → workspace).
persistence true
persistence_location /var/lib/foresthub/workspace/

# Structured to stdout; the container runtime captures the stream.
log_dest stdout
log_type warning
log_type error
log_type notice
